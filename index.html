<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Consulta por CPF</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(to right, #4e54c8, #8f94fb);
      height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    h1 {
      color: #4e54c8;
      margin-bottom: 20px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 16px;
    }

    button {
      background-color: #4e54c8;
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background-color: #3b3fc0;
    }

    #resultado {
      margin-top: 20px;
      font-size: 16px;
      color: #333;
      text-align: left;
    }

    .erro {
      color: red;
    }

    .sucesso {
      color: green;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Buscar CPF</h1>
    <input type="text" id="cpf" placeholder="Digite o CPF (somente números)">
    <button onclick="buscar()">Buscar</button>
    <div id="resultado"></div>
  </div>

  <script>
    async function buscar() {
      const cpf = document.getElementById("cpf").value.trim();
      const resultadoDiv = document.getElementById("resultado");

      if (!cpf) {
        resultadoDiv.innerHTML = '<p class="erro">❌ Por favor, digite um CPF.</p>';
        return;
      }

      resultadoDiv.innerHTML = "🔎 Buscando...";

      const url = "https://script.google.com/macros/s/AKfycbxrDiAOR5_Ifvl4unNx64qWqtGUXxypwzVkuRw2dm3WugUKq6341UObT5Lhu-vGYtc1/exec?cpf=" + encodeURIComponent(cpf);

      try {
        const res = await fetch(url);
        const data = await res.json();

        if (data.erro) {
          resultadoDiv.innerHTML = `<p class="erro">❌ ${data.erro}</p>`;
        } else {
          resultadoDiv.innerHTML = `
            <p class="sucesso">✅ <strong>Nome:</strong> ${data.nome}</p>
            <p class="sucesso">🏢 <strong>Departamento:</strong> ${data.departamento}</p>
          `;
        }
      } catch (err) {
        resultadoDiv.innerHTML = '<p class="erro">⚠️ Erro ao buscar dados.</p>';
        console.error(err);
      }
    }
  </script>
</body>
</html>
