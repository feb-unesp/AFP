<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Consulta por CPF</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px;}
    label, input { display: block; margin-bottom: 10px; }
    #resposta { margin-top: 20px; }
  </style>
</head>
<body>
  <h2>Consulta de Dados por CPF</h2>
  <form id="formCPF">
    <label>Digite o CPF:</label>
    <input type="text" id="cpf" maxlength="11" required>
    <button type="submit">Buscar</button>
  </form>
  <div id="resposta"></div>
  <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbxrDiAOR5_Ifvl4unNx64qWqtGUXxypwzVkuRw2dm3WugUKq6341UObT5Lhu-vGYtc1/exec";
    // Substitua SEU_DEPLOY_ID_AQUI pelo ID do seu Apps Script publicado.

    document.getElementById('formCPF').addEventListener('submit', function(e) {
      e.preventDefault();
      const cpf = document.getElementById('cpf').value.trim();
      if (!cpf) return alert("Digite o CPF primeiro.");

      fetch(`${scriptURL}?cpf=${encodeURIComponent(cpf)}`)
        .then(r => r.json())
        .then(data => {
          const div = document.getElementById('resposta');
          if (data.erro) {
            div.innerHTML = `<span style="color:red">${data.erro}</span>`;
          } else {
            div.innerHTML = `
              <strong>CPF:</strong> ${data.cpf}<br>
              <strong>Nome:</strong> ${data.nome}<br>
              <strong>Email:</strong> ${data.email}<br>
              <strong>Departamento:</strong> ${data.departamento}
            `;
          }
        })
        .catch(() => {
          document.getElementById('resposta').innerHTML = "<span style='color: red'>Erro ao consultar. Tente novamente.</span>";
        });
    });
  </script>
</body>
</html>
