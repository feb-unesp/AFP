<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitação de Auxílio Financeiro ao Pesquisador</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f0f0f0;
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .container {
        background-color: #fff;
        padding: 24px 28px;
        border-radius: 10px;
        box-shadow: 0 2px 8px #0002;
        width: 100%;
        max-width: 470px;
    }
    h2 {
        text-align: center;
        color: #1a237e;
    }
    label {
        display: block;
        margin-top: 12px;
        margin-bottom: 2px;
        font-weight: 600;
    }
    input,
    select,
    textarea {
        width: 100%;
        padding: 8px;
        margin-bottom: 12px;
        border: 1px solid #bdbdbd;
        border-radius: 5px;
        font-size: 1rem;
        box-sizing: border-box;
    }
    input[readonly] {
        background-color: #e0e0e0;
        color: #616161;
    }
    button {
        background-color: #1976d2;
        color: #fff;
        border: none;
        padding: 10px 22px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 1rem;
        margin-top: 12px;
        transition: background 0.2s;
        width: 100%;
    }
    button:hover {
        background-color: #1565c0;
    }
</style>
<script>
async function buscarPesquisadorPorCPF() {
    const cpf = document.getElementById('cpf').value.replace(/\D/g, '');
    if (!cpf || cpf.length !== 11) {
        document.getElementById('nome').value = '';
        document.getElementById('email').value = '';
        document.getElementById('departamento').value = '';
        return;
    }
    try {
        const url = 'https://script.google.com/macros/s/AKfycbxrDiAOR5_Ifvl4unNx64qWqtGUXxypwzVkuRw2dm3WugUKq6341UObT5Lhu-vGYtc1/exec';
        const resp = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ cpf })
        });
        const dados = await resp.json();
        if (dados && dados.nome) {
            document.getElementById('nome').value = dados.nome;
            document.getElementById('email').value = dados.email;
            document.getElementById('departamento').value = dados.departamento;
        } else {
            document.getElementById('nome').value = '';
            document.getElementById('email').value = '';
            document.getElementById('departamento').value = '';
            alert('Pesquisador não encontrado.');
        }
    } catch (e) {
        alert('Erro na consulta: ' + e.message);
    }
}

</script>
</head>
<body>
  <div class="container">
    <h2>Solicitação de Auxílio Financeiro ao Pesquisador</h2>
        <form>
            <label for="cpf">CPF do Pesquisador</label>
            <input type="text" id="cpf" name="cpf" maxlength="14" required pattern="\d{11}" onblur="buscarPesquisadorPorCPF()" placeholder="Digite o CPF">

            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" name="nome" readonly>

            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" readonly>

            <label for="departamento">Departamento</label>
            <input type="text" id="departamento" name="departamento" readonly>

            <!-- Os campos abaixo permanecem como no seu formulário original. -->


            <button type="submit">Enviar Solicitação</button>
        </form>
    </div>
</body>
</html>
