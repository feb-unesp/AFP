<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Consulta por CPF</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(to right, #4e54c8, #8f94fb);
      height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    h1 {
      color: #4e54c8;
      margin-bottom: 20px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 16px;
    }

    button {
      background-color: #4e54c8;
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background-color: #3b3fc0;
    }

    #resultado {
      margin-top: 20px;
      font-size: 16px;
      color: #333;
      text-align: left;
    }

    .erro {
      color: red;
    }

    .sucesso {
      color: green;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Buscar Pesquisador</h1>
    <input type="text" id="cpf" placeholder="Digite o CPF (somente números)" maxlength="11">
    <button onclick="buscar()">Buscar</button>
    <div id="resultado"></div>
  </div>

  <script>
    // Função para formatar CPF
    function formatarCPF(cpf) {
      return cpf.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4");
    }

    async function buscar() {
      const cpfInput = document.getElementById("cpf");
      let cpf = cpfInput.value.trim().replace(/\D/g, '');
      const resultadoDiv = document.getElementById("resultado");

      // Aplica máscara de CPF
      if (cpf.length === 11) {
        cpfInput.value = formatarCPF(cpf);
      }

      if (!cpf || cpf.length !== 11) {
        resultadoDiv.innerHTML = '<p class="erro">❌ Por favor, digite um CPF válido (11 dígitos).</p>';
        return;
      }

      resultadoDiv.innerHTML = "🔎 Buscando pesquisador...";

      // URL do Google Apps Script que acessará a planilha
      const scriptUrl = "https://script.google.com/macros/s/AKfycbxrDiAOR5_Ifvl4unNx64qWqtGUXxypwzVkuRw2dm3WugUKq6341UObT5Lhu-vGYtc1/exec";
      
      const url = `${scriptUrl}?planilhaId=1J9yHiKY0BsJYCqKsPh7WESJ6d7MlDTorfYeJYx4ObFA&aba=Pesquisador&cpf=${encodeURIComponent(cpf)}`;

      try {
        const res = await fetch(url);
        const data = await res.json();

        if (data.erro) {
          resultadoDiv.innerHTML = `<p class="erro">❌ ${data.erro}</p>`;
        } else {
          resultadoDiv.innerHTML = `
            <p class="sucesso">✅ <strong>Nome:</strong> ${data.nome || 'Não encontrado'}</p>
            <p class="sucesso">🏢 <strong>Departamento:</strong> ${data.departamento || 'Não informado'}</p>
            <p class="sucesso">📧 <strong>Email:</strong> ${data.email || 'Não informado'}</p>
          `;
        }
      } catch (err) {
        resultadoDiv.innerHTML = '<p class="erro">⚠️ Erro ao buscar dados. Tente novamente.</p>';
        console.error("Erro na busca:", err);
      }
    }

    // Adiciona máscara de CPF enquanto digita
    document.getElementById("cpf").addEventListener("input", function(e) {
      let value = e.target.value.replace(/\D/g, '');
      if (value.length > 11) {
        value = value.substring(0, 11);
      }
      e.target.value = value;
    });

    // Permite buscar com Enter
    document.getElementById("cpf").addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        buscar();
      }
    });
  </script>
</body>
</html>
